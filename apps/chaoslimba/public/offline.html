<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1E1830" />
    <title>Offline — ChaosLimbă</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #1E1830;
        color: #F7F5FA;
      }
      main {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 0.75rem;
        color: #DFA649;
      }
      p {
        max-width: 28rem;
        line-height: 1.55;
        margin: 0 0 1.5rem;
        color: rgba(247, 245, 250, 0.85);
      }
      button {
        background: #DFA649;
        color: #1E1830;
        border: none;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 0.5rem;
        cursor: pointer;
      }
      button:hover { filter: brightness(1.05); }
    </style>
  </head>
  <body>
    <main>
      <h1>You&rsquo;re offline</h1>
      <p>
        ChaosLimbă needs a connection for grammar checks, speech recognition, and
        the AI tutor. Reconnect and try again.
      </p>
      <button onclick="window.location.reload()">Retry</button>
    </main>
  </body>
</html>
